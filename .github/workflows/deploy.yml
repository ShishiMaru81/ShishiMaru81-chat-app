name: Deploy

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    if: >
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout correct commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Fetch tags
        run: git fetch --tags

      - name: Detect latest services tag
        id: tag
        run: |
          set -euo pipefail

          TAG=$(git tag --points-at HEAD | grep '^@chat/services@' | head -n 1 || true)

          if [[ -z "$TAG" ]]; then
            echo "::error::No services tag found on this commit"
            exit 1
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Detected tag: $TAG"

      - name: Parse tag
        id: meta
        run: |
          set -euo pipefail

          TAG="${{ steps.tag.outputs.tag }}"

          VERSION="${TAG##*@}"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/chat-services"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "version_tag=$IMAGE:$VERSION" >> $GITHUB_OUTPUT
          echo "latest_tag=$IMAGE:latest" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CHANGESETS_GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -f docker/socket.Dockerfile \
            -t "${{ steps.meta.outputs.version_tag }}" \
            .

          docker tag "${{ steps.meta.outputs.version_tag }}" "${{ steps.meta.outputs.latest_tag }}"

      - name: Push image
        run: |
          docker push "${{ steps.meta.outputs.version_tag }}"
          docker push "${{ steps.meta.outputs.latest_tag }}"

      - name: Deploy to staging
        run: echo "Deploying ${{ steps.meta.outputs.version_tag }} to staging"

      - name: Deploy to production
        run: echo "Deploying ${{ steps.meta.outputs.version_tag }} to production"